version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    ignore:
      # pytest-homeassistant-custom-component pins this test stack exactly.
      - dependency-name: pytest
      - dependency-name: pytest-asyncio

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
