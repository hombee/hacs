name: Continuous integration

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python quality and tests
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@v1
      - name: Set up Python
        uses: useblacksmith/setup-python@v6
        with:
          python-version-file: ".python-version"
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install Python dependencies
        run: uv sync --locked --extra dev
      - name: Check formatting
        run: uv run --locked black --check .
      - name: Lint Python
        run: uv run --locked ruff check .
      - name: Validate repository structure
        run: uv run --locked python scripts/validate_structure.py
      - name: Validate translations
        run: uv run --locked python scripts/check_translations.py
      - name: Run tests
        run: uv run --locked pytest
  home-assistant:
    name: Home Assistant compatibility
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@v1
      - name: Validate HACS metadata
        uses: hacs/action@main
        with:
          category: integration
      - name: Run Hassfest
        uses: home-assistant/actions/hassfest@master
  docker:
    name: Home Assistant Docker smoke
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@v1
      - name: Run Docker smoke test
        run: bash scripts/ha_docker_smoke.sh
  release:
    name: Release dry run
    if: github.event_name != 'push'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@v1
        with:
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.10.0"
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install release dependencies
        run: bun install --frozen-lockfile
      - name: Verify release runtime
        run: bun run release -- --dry-run --no-ci
  security:
    name: Security audit
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@v1
      - name: Set up Python
        uses: useblacksmith/setup-python@v6
        with:
          python-version-file: ".python-version"
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install audit tools
        run: uv sync --locked --extra dev
      - name: Run Bandit
        run: uv run --locked bandit -r custom_components scripts -c pyproject.toml
      - name: Audit runtime dependencies
        run: |
          uv export --locked --no-dev --no-emit-project --format requirements-txt --output-file /tmp/hombee-runtime-requirements.txt
          uv run --locked pip-audit --requirement /tmp/hombee-runtime-requirements.txt
